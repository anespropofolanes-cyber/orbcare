<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORB 工作人員注意事項</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1f1;
    --topbar:#56514f;
    --accent:#b07f86;
    --accent-soft:#f7e9eb;
    --rose:#eed0d3;
    --grey:#9e9e9f;
    --card:#ffffff;
    --line:#e6dedf;
    --text:#3a3537;
    --muted:#9e9e9f;
    --pin:#a86a72;
    --pin-soft:#faf0f1;
    --pin-line:#eed0d3;
    --radius:14px;
    --border:1.5px solid var(--line);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    line-height:1.75;font-weight:400;font-size:16px;letter-spacing:.01em;
    -webkit-font-smoothing:antialiased;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;
  }
  input,textarea{-webkit-user-select:text;user-select:text;}
  img{-webkit-user-drag:none;user-drag:none;pointer-events:none;}
  .num,.date,code{font-family:"DM Mono",monospace;font-feature-settings:"tnum";}

  /* ---- Top bar ---- */
  header.topbar{
    position:sticky;top:0;z-index:50;background:var(--topbar);color:#fff;
    padding:18px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);
  }
  .topbar .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:500;margin-bottom:6px;}
  .topbar h1{font-size:21px;font-weight:500;letter-spacing:.04em;display:flex;align-items:center;gap:9px;}
  .topbar h1 svg{width:21px;height:21px;flex:none;opacity:.9;}
  .topbar .meta{margin-top:7px;font-size:12.5px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}

  /* ---- Cover / hero ---- */
  .cover{position:relative;width:100%;height:clamp(150px,26vw,280px);overflow:hidden;display:flex;justify-content:flex-end;align-items:center;
    background-color:#f2ede2;
    background-image:
      radial-gradient(1.6px 1.6px at 9% 28%, rgba(201,162,107,.6), transparent 60%),
      radial-gradient(1.2px 1.2px at 19% 58%, rgba(201,162,107,.5), transparent 60%),
      radial-gradient(1.4px 1.4px at 6% 70%, rgba(201,162,107,.45), transparent 60%),
      radial-gradient(1.1px 1.1px at 28% 20%, rgba(201,162,107,.45), transparent 60%),
      radial-gradient(1px 1px at 24% 78%, rgba(201,162,107,.4), transparent 60%),
      radial-gradient(2px 2px at 15% 44%, rgba(176,127,134,.3), transparent 60%),
      radial-gradient(1.1px 1.1px at 33% 50%, rgba(201,162,107,.35), transparent 60%),
      radial-gradient(1px 1px at 12% 86%, rgba(201,162,107,.3), transparent 60%);}
  .cover-img{height:100%;width:auto;max-width:100%;display:block;
    -webkit-mask-image:linear-gradient(to right, transparent 0%, rgba(0,0,0,0) 5%, #000 40%);
    mask-image:linear-gradient(to right, transparent 0%, rgba(0,0,0,0) 5%, #000 40%);}
  .cover::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg, rgba(247,243,238,.5) 0%, rgba(247,243,238,.18) 24%, rgba(247,243,238,0) 44%);}
  .cover-overlay{position:absolute;inset:0;display:flex;align-items:center;z-index:2;line-height:normal;}
  .ov-inner{padding-left:6%;max-width:48%;}
  .ov-inner .eyebrow{font-size:clamp(8px,1.4vw,12px);letter-spacing:.3em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:clamp(3px,.9vw,8px);}
  .ov-inner h1{font-size:clamp(15px,3.3vw,31px);font-weight:500;letter-spacing:.04em;color:#4a403c;line-height:1.32;}
  .ov-inner .meta{margin-top:clamp(4px,1vw,11px);font-size:clamp(9px,1.4vw,13px);color:#8a7f79;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .ov-inner .meta .dot{opacity:.55;}

  /* ---- Detail sub-bar ---- */
  .detailbar{
    position:sticky;top:0;z-index:45;background:var(--card);
    border-bottom:var(--border);padding:13px 16px;
    display:flex;align-items:center;gap:12px;
  }
  .detailbar .back{
    border:var(--border);background:var(--bg);color:var(--accent);
    width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;cursor:pointer;flex:none;transition:.15s;
  }
  .detailbar .back:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .detailbar .back svg{width:18px;height:18px;}
  .detailbar .d-icon{width:34px;height:34px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;}
  .detailbar .d-icon svg{width:18px;height:18px;}
  .detailbar .d-title{font-size:16px;font-weight:500;letter-spacing:.02em;flex:1;}
  .detailbar .d-count{font-size:12px;color:var(--muted);background:var(--bg);border-radius:999px;padding:2px 9px;}

  /* ---- Search ---- */
  .searchwrap{position:sticky;top:0;z-index:40;background:var(--bg);padding:14px 16px 4px;}
  .searchbox{position:relative;display:flex;align-items:center;background:var(--card);border:var(--border);border-radius:var(--radius);padding:0 14px;}
  .searchbox svg{width:18px;height:18px;color:var(--muted);flex:none;}
  .searchbox input{border:none;outline:none;background:transparent;width:100%;padding:12px 10px;font-size:15px;font-family:inherit;color:var(--text);}
  .searchbox input::placeholder{color:var(--muted);}
  .searchbox .clear{display:none;border:none;background:transparent;cursor:pointer;color:var(--muted);padding:4px;font-size:18px;line-height:1;}
  .searchbox .clear.show{display:block;}

  main{padding:8px 16px 56px;max-width:720px;margin:0 auto;}

  /* ---- Announcements ---- */
  .pin-block{background:var(--pin-soft);border:1.5px solid var(--pin-line);border-radius:var(--radius);padding:14px 16px;margin:6px 0 22px;}
  .pin-head{display:flex;align-items:center;gap:8px;width:100%;border:none;background:transparent;cursor:pointer;font-family:inherit;color:var(--pin);font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:0;}
  .pin-head>svg{width:16px;height:16px;flex:none;}
  .pin-title{flex:1;text-align:left;}
  .pin-count{font-size:12px;letter-spacing:0;background:#fff;border:1px solid var(--pin-line);border-radius:999px;padding:1px 9px;color:var(--pin);}
  .pin-chev{display:flex;color:var(--pin);transition:transform .25s;}
  .pin-chev svg{width:16px;height:16px;}
  .pin-block.open .pin-chev{transform:rotate(180deg);}
  .pin-body{display:none;margin-top:14px;}
  .pin-block.open .pin-body{display:block;}
  .pin-item{display:flex;gap:13px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--pin-line);}
  .pin-item:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
  .pin-date{flex:none;font-size:12.5px;color:var(--pin);background:#fff;border:1px solid var(--pin-line);border-radius:7px;padding:3px 8px;height:fit-content;letter-spacing:.02em;}
  .pin-text{font-size:15px;color:var(--text);line-height:1.7;}
  .pin-text .who{font-weight:500;color:var(--pin);}

  .grid-label{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:4px 2px 12px;font-weight:500;}

  /* ---- Card gallery ---- */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{
    position:relative;background:var(--card);border:var(--border);border-radius:var(--radius);
    padding:16px 15px 15px;cursor:pointer;display:flex;flex-direction:column;
    min-height:138px;transition:transform .15s,box-shadow .15s,border-color .15s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(86,81,79,.13);border-color:var(--rose);}
  .card:active{transform:translateY(0);}
  .card .c-icon{width:38px;height:38px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:auto;}
  .card .c-icon svg{width:20px;height:20px;}
  .card .c-no{position:absolute;top:15px;right:15px;font-size:12px;color:#c5c5c6;letter-spacing:.05em;}
  .card h3{font-size:15.5px;font-weight:500;letter-spacing:.02em;margin-top:14px;line-height:1.5;}
  .card .c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .card .c-count{font-size:12px;color:var(--muted);}
  .card .c-arrow{color:#b8b8b9;display:flex;}
  .card .c-arrow svg{width:16px;height:16px;}

  /* ---- Detail content ---- */
  .detail-content{padding:14px 16px 56px;max-width:720px;margin:0 auto;}
  .flow-cta{display:flex;align-items:center;gap:13px;text-decoration:none;color:var(--text);
    background:var(--accent-soft);border:1.5px solid var(--rose);border-radius:var(--radius);
    padding:14px 15px;margin:2px 0 20px;transition:background .15s,box-shadow .15s,transform .15s;}
  .flow-cta:hover{background:#f3dee1;box-shadow:0 6px 16px rgba(176,127,134,.18);transform:translateY(-1px);}
  .flow-cta:active{transform:translateY(0);}
  .flow-cta .fc-icon{width:40px;height:40px;border-radius:11px;background:#fff;border:1px solid var(--rose);
    color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;}
  .flow-cta .fc-icon svg{width:21px;height:21px;}
  .flow-cta .fc-text{flex:1;min-width:0;}
  .flow-cta .fc-label{font-size:15px;font-weight:500;color:var(--pin);display:flex;align-items:center;gap:6px;}
  .flow-cta .fc-label .fc-ext{display:flex;color:var(--accent);}
  .flow-cta .fc-label .fc-ext svg{width:13px;height:13px;}
  .flow-cta .fc-desc{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .flow-cta .fc-arrow{color:var(--accent);flex:none;display:flex;}
  .flow-cta .fc-arrow svg{width:18px;height:18px;}
  .subgroup{margin:6px 0 18px;}
  .subgroup-title{font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.06em;margin:18px 0 8px;display:flex;align-items:center;gap:7px;}
  .subgroup-title::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);flex:none;}
  ul.items{list-style:none;background:var(--card);border:var(--border);border-radius:var(--radius);padding:4px 16px;}
  ul.items li{position:relative;padding:12px 0 12px 20px;font-size:14.5px;line-height:1.8;color:var(--text);border-bottom:1px dashed var(--line);}
  ul.items li:last-child{border-bottom:none;}
  ul.items li::before{content:"";position:absolute;left:3px;top:19px;width:6px;height:6px;border:1.5px solid var(--accent);border-radius:50%;}
  ul.items li b{font-weight:500;color:var(--topbar);}
  ul.items li code{background:var(--accent-soft);color:var(--accent);padding:1px 6px;border-radius:5px;font-size:13px;}
  mark{background:var(--rose);color:var(--text);padding:0 2px;border-radius:3px;}

  /* ---- Search results ---- */
  .res-group{margin-bottom:20px;}
  .res-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.04em;margin:0 2px 9px;}
  .res-head svg{width:15px;height:15px;}

  .noresult{display:none;text-align:center;padding:50px 20px;color:var(--muted);}
  .noresult svg{width:36px;height:36px;opacity:.5;margin-bottom:12px;}

  footer{text-align:center;padding:8px 20px 40px;color:var(--muted);font-size:12px;line-height:2;}

  .hide{display:none!important;}
</style>
</head>

const arrow=svgWrap('<path d="m9 18 6-6-6-6"/>');
const pad2=n=>String(n).padStart(2,'0');
const countItems=sec=>sec.groups.reduce((n,g)=>n+g.items.length,0);
function strip(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent||'';}
function buildBody(sec,rx){
  let h='';
  if(sec.cta&&!rx){
    h+='<a class="flow-cta" href="'+sec.cta.url+'" target="_blank" rel="noopener">'+
       '<span class="fc-icon">'+svgWrap('<path d="M12 4v16"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>')+'</span>'+
       '<span class="fc-text"><span class="fc-label">'+sec.cta.label+'<span class="fc-ext">'+svgWrap('<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>')+'</span></span><span class="fc-desc">'+sec.cta.desc+'</span></span>'+
       '<span class="fc-arrow">'+arrow+'</span></a>';
  }
  sec.groups.forEach(g=>{
    h+='<div class="subgroup">';
    if(g.sub)h+='<div class="subgroup-title">'+g.sub+'</div>';
    h+='<ul class="items">';
    g.items.forEach(it=>{ h+='<li>'+(rx?it.replace(rx,'<mark>$1</mark>'):it)+'</li>'; });
    h+='</ul></div>';
  });
  return h;
}

/* ---- Build cards ---- */
const grid=document.getElementById('grid');
DATA.forEach((sec,i)=>{
  const c=document.createElement('div');
  c.className='card';
  c.innerHTML=
    '<div class="c-no num">'+pad2(i+1)+'</div>'+
    '<div class="c-icon">'+svgWrap(ICON[sec.icon])+'</div>'+
    '<h3>'+sec.title+'</h3>'+
    '<div class="c-foot"><span class="c-count num">'+countItems(sec)+' 項</span><span class="c-arrow">'+arrow+'</span></div>';
  c.addEventListener('click',()=>openDetail(sec.id));
  grid.appendChild(c);
});

/* ---- Views ---- */
const homeView=document.getElementById('homeView');
const detailView=document.getElementById('detailView');
let homeScroll=0;

function openDetail(id){
  const sec=DATA.find(s=>s.id===id);
  homeScroll=window.scrollY;
  document.getElementById('dIcon').innerHTML=svgWrap(ICON[sec.icon]);
  document.getElementById('dTitle').textContent=sec.title;
  document.getElementById('dCount').textContent=countItems(sec)+' 項';
  document.getElementById('detailContent').innerHTML=buildBody(sec);
  homeView.classList.add('hide');
  detailView.classList.remove('hide');
  window.scrollTo(0,0);
  history.pushState({view:'detail'},'');
}
function goHome(){
  detailView.classList.add('hide');
  homeView.classList.remove('hide');
  window.scrollTo(0,homeScroll);
}
document.getElementById('backBtn').addEventListener('click',()=>history.back());
window.addEventListener('popstate',()=>{ if(!detailView.classList.contains('hide'))goHome(); });

/* ---- Search ---- */
const search=document.getElementById('search');
const clearBtn=document.getElementById('clearBtn');
const results=document.getElementById('results');
const noresult=document.getElementById('noresult');
const noKey=document.getElementById('noKey');
const pinBlock=document.getElementById('pinBlock');
const gridLabel=document.getElementById('gridLabel');

function showHome(){ pinBlock.classList.remove('hide');gridLabel.classList.remove('hide');grid.classList.remove('hide');results.classList.add('hide');noresult.style.display='none'; }

function doSearch(q){
  q=q.trim();
  if(!q){clearBtn.classList.remove('show');showHome();return;}
  clearBtn.classList.add('show');
  const ql=q.toLowerCase();
  const rx=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  pinBlock.classList.add('hide');gridLabel.classList.add('hide');grid.classList.add('hide');
  let html='',any=false;
  DATA.forEach(sec=>{
    const hits=[];
    sec.groups.forEach(g=>g.items.forEach(it=>{ if(strip(it).toLowerCase().includes(ql))hits.push(it); }));
    if(hits.length){
      any=true;
      html+='<div class="res-group"><div class="res-head">'+svgWrap(ICON[sec.icon])+sec.title+'</div><ul class="items">';
      hits.forEach(it=>{ html+='<li>'+it.replace(rx,'<mark>$1</mark>')+'</li>'; });
      html+='</ul></div>';
    }
  });
  results.innerHTML=html;
  results.classList.toggle('hide',!any);
  noresult.style.display=any?'none':'block';
  noKey.textContent=q;
}
search.addEventListener('input',e=>doSearch(e.target.value));
clearBtn.addEventListener('click',()=>{search.value='';doSearch('');search.focus();});

/* ---- Collapsible announcements ---- */
const pinToggle=document.getElementById('pinToggle');
pinToggle.addEventListener('click',()=>{
  const open=pinBlock.classList.toggle('open');
  pinToggle.setAttribute('aria-expanded',open);
});

/* ---- Copy deterrent (basic) ---- */
['contextmenu','copy','cut','selectstart','dragstart'].forEach(ev=>{
  document.addEventListener(ev,e=>{ if(!e.target.closest('input')) e.preventDefault(); });
});
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&['c','x','a'].includes(e.key.toLowerCase())&&!e.target.closest('input')) e.preventDefault();
});
</script>
</body>
</html>
